<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>shirt preview</title>
<style>html,body{margin:0;height:100%;background:#f1f0ee}#c{width:100%;height:100%;display:block}</style>
<script type="importmap">
{"imports":{"three":"/node_modules/three/build/three.module.js","three/addons/":"/node_modules/three/examples/jsm/"}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const params = new URLSearchParams(location.search);
const AZIM = parseFloat(params.get('azim') ?? '20');   // degrees
const ELEV = parseFloat(params.get('elev') ?? '8');
const BODY = params.get('body') ?? '#6b3fa0';
const TRIM = params.get('trim') ?? '#3f5fa0';
const DESIGN = params.get('design') ?? 'gradient';     // gradient|solid|test

// ---------- load mesh ----------
async function loadShirt(url) {
  const buf = await (await fetch(url)).arrayBuffer();
  const dv = new DataView(buf);
  const jsonLen = dv.getUint32(8, true);
  const json = JSON.parse(new TextDecoder().decode(new Uint8Array(buf, 12, jsonLen)).replace(/\0+$/, ''));
  const base = 12 + jsonLen;
  const meshes = {};
  for (const m of json.meshes) {
    let o = base + m.offset;
    const pos = new Float32Array(buf, o, m.v * 3); o += m.v * 12;
    const nrm = new Float32Array(buf, o, m.v * 3); o += m.v * 12;
    const uv = new Float32Array(buf, o, m.v * 2); o += m.v * 8;
    const ao = new Float32Array(buf, o, m.v); o += m.v * 4;
    const idx = new Uint32Array(buf, o, m.i);
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('normal', new THREE.BufferAttribute(nrm, 3));
    g.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
    // AO as vertex color (multiplies map)
    const col = new Float32Array(m.v * 3);
    for (let i = 0; i < m.v; i++) { col[i*3] = col[i*3+1] = col[i*3+2] = ao[i]; }
    g.setAttribute('color', new THREE.BufferAttribute(col, 3));
    g.setIndex(new THREE.BufferAttribute(idx, 1));
    meshes[m.name] = { geometry: g, material: m.material };
  }
  return meshes;
}

// ---------- design texture (stand-in for the app compositor) ----------
function makeDesign() {
  const c = document.createElement('canvas');
  c.width = c.height = 2048;
  const ctx = c.getContext('2d');
  ctx.fillStyle = BODY; ctx.fillRect(0, 0, 2048, 2048);
  if (DESIGN === 'gradient') {
    // owayo-dirt-like: purple top fading to navy with speckle
    const ISLANDS = [
      { x: 20, y: 460, w: 986, h: 1309 }, { x: 1042, y: 460, w: 986, h: 1309 },
      { x: 24, y: 24, w: 748, h: 400 }, { x: 800, y: 24, w: 748, h: 400 },
    ];
    for (const isl of ISLANDS) {
      const g = ctx.createLinearGradient(0, isl.y, 0, isl.y + isl.h);
      g.addColorStop(0, '#6b3fa0'); g.addColorStop(1, '#252a4d');
      ctx.fillStyle = g; ctx.fillRect(isl.x, isl.y, isl.w, isl.h);
      ctx.fillStyle = '#1d2240';
      for (let i = 0; i < 4200; i++) {
        const t = Math.random();
        const yy = isl.y + t * t * isl.h;
        const xx = isl.x + Math.random() * isl.w;
        const r = 1 + Math.random() * 4 * (0.3 + t);
        ctx.beginPath(); ctx.arc(xx, yy, r, 0, 7); ctx.fill();
      }
    }
  } else if (DESIGN === 'test') {
    // UV debug grid
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    for (let x = 0; x < 2048; x += 128) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 2048); ctx.stroke(); }
    for (let y = 0; y < 2048; y += 128) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(2048, y); ctx.stroke(); }
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 120px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('FRONT', 513, 1150); ctx.fillText('BACK', 1535, 1150);
    ctx.font = 'bold 60px sans-serif';
    ctx.fillText('SL', 398, 240); ctx.fillText('SR', 1174, 240);
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  return t;
}

// ---------- knit normal ----------
function makeKnitNormal() {
  const N = 256, c = document.createElement('canvas');
  c.width = c.height = N;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(N, N);
  const h = (x, y) => {
    const u = (x / N) * Math.PI * 2 * 30, v = (y / N) * Math.PI * 2 * 30;
    return Math.sin(u) * Math.cos(v) * 0.5 + Math.sin(u * 0.5 + v) * 0.3;
  };
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    const nx = h((x-1+N)%N, y) - h((x+1)%N, y);
    const ny = h(x, (y-1+N)%N) - h(x, (y+1)%N);
    const l = Math.hypot(nx, ny, 1);
    const i = (y * N + x) * 4;
    img.data[i] = (nx/l*0.5+0.5)*255; img.data[i+1] = (ny/l*0.5+0.5)*255;
    img.data[i+2] = (1/l*0.5+0.5)*255; img.data[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(40, 40);
  return t;
}

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#f1f0ee');
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(30, innerWidth / innerHeight, 0.05, 20);
const az = AZIM * Math.PI / 180, el = ELEV * Math.PI / 180, dist = 1.78;
camera.position.set(Math.sin(az) * Math.cos(el) * dist, 0.10 + Math.sin(el) * dist, Math.cos(az) * Math.cos(el) * dist);
camera.lookAt(0, 0.10, 0);

const key = new THREE.DirectionalLight('#fff8ef', 1.6);
key.position.set(0.8, 1.6, 1.2);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -0.6; key.shadow.camera.right = 0.6;
key.shadow.camera.top = 0.8; key.shadow.camera.bottom = -0.8;
key.shadow.radius = 6;
scene.add(key);
const fill = new THREE.DirectionalLight('#eef2ff', 0.5);
fill.position.set(-1.2, 0.4, 0.6);
scene.add(fill);
scene.add(new THREE.AmbientLight('#ffffff', 0.25));

const design = makeDesign();
const knit = makeKnitNormal();

const mats = {
  fabric: new THREE.MeshPhysicalMaterial({
    map: design, vertexColors: true,
    normalMap: knit, normalScale: new THREE.Vector2(0.35, 0.35),
    roughness: 0.82, metalness: 0, sheen: 0.55, sheenRoughness: 0.6, sheenColor: new THREE.Color('#ffffff'),
    envMapIntensity: 0.55, side: THREE.FrontSide,
  }),
  lining: new THREE.MeshStandardMaterial({ color: '#cfcbc6', roughness: 0.95, side: THREE.BackSide }),
  collar: new THREE.MeshPhysicalMaterial({
    color: TRIM, vertexColors: true, normalMap: knit, normalScale: new THREE.Vector2(0.3, 0.3),
    roughness: 0.78, sheen: 0.4, envMapIntensity: 0.5, side: THREE.FrontSide,
  }),
  collarLining: new THREE.MeshStandardMaterial({ color: '#d8d5d0', roughness: 0.95, side: THREE.BackSide }),
  cuff: new THREE.MeshPhysicalMaterial({ color: TRIM, roughness: 0.8, sheen: 0.3, envMapIntensity: 0.5, side: THREE.DoubleSide }),
  tape: new THREE.MeshStandardMaterial({ color: '#e8e6e2', roughness: 0.85, side: THREE.DoubleSide }),
  metal: new THREE.MeshStandardMaterial({ color: '#b9bcc2', roughness: 0.35, metalness: 0.9, side: THREE.DoubleSide }),
  mann: new THREE.MeshStandardMaterial({ color: '#c9b8a6', roughness: 0.9, transparent: true, opacity: 0.85, side: THREE.DoubleSide }),
};

const group = new THREE.Group();
scene.add(group);
loadShirt('/public/shirt.bin').then((meshes) => {
  for (const [name, m] of Object.entries(meshes)) {
    const mat = mats[m.material] ?? mats.fabric;
    const mesh = new THREE.Mesh(m.geometry, mat);
    mesh.castShadow = true; mesh.receiveShadow = true;
    group.add(mesh);
    // interior lining pass for fabric + collar
    if (m.material === 'fabric') {
      const lin = new THREE.Mesh(m.geometry, mats.lining);
      group.add(lin);
    } else if (m.material === 'collar') {
      group.add(new THREE.Mesh(m.geometry, mats.collarLining));
    }
  }
  // soft ground shadow
  const shadowGeo = new THREE.PlaneGeometry(1.6, 1.6);
  const shadowTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 256;
    const x = c.getContext('2d');
    const g = x.createRadialGradient(128, 128, 10, 128, 128, 120);
    g.addColorStop(0, 'rgba(0,0,0,0.30)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    x.fillStyle = g; x.fillRect(0, 0, 256, 256);
    return new THREE.CanvasTexture(c);
  })();
  const shadow = new THREE.Mesh(shadowGeo, new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, depthWrite: false }));
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = -0.52;
  scene.add(shadow);

  renderer.render(scene, camera);
  document.title = 'READY';
});

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.12, 0);
function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); }
loop();
</script>
</body>
</html>
