<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orschell Supply Co.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg-base:    #1C1F24;
        --bg-surface: #2B2E35;
        --bg-card:    #33373F;
        --bg-input:   #22262D;
        --accent:     #F76B10;
        --accent-h:   #D95E0D;
        --yellow:     #FFD600;
        --text:       #EAEAEA;
        --muted:      #9AA0AB;
        --danger:     #E84040;
        --success:    #27AE60;
        --warning:    #F5A623;
        --border:     1px solid #3E434D;
        --radius:     3px;
        --hazard: repeating-linear-gradient(-45deg,#F76B10,#F76B10 10px,#1C1F24 10px,#1C1F24 20px);
      }
      html, body, #root { height: 100%; }
      body { background: var(--bg-base); color: var(--text); font-family: 'Inter', sans-serif; }
      h1,h2,h3,h4,h5,h6 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.04em; }
      a { color: inherit; text-decoration: none; }
      img { max-width: 100%; display: block; }
      button { cursor: pointer; }
      input, textarea, select { outline: none; }

      .btn {
        display: inline-flex; align-items: center; gap: 6px;
        background: var(--accent); color: #fff; border: none;
        font: 700 14px 'Barlow Condensed', sans-serif; text-transform: uppercase;
        letter-spacing: 0.06em; padding: 10px 24px; border-radius: var(--radius);
        transition: background 0.15s;
      }
      .btn:hover { background: var(--accent-h); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-outline {
        background: transparent; border: 2px solid var(--accent); color: var(--accent);
      }
      .btn-outline:hover { background: var(--accent); color: #fff; }
      .btn-sm { padding: 6px 14px; font-size: 12px; }
      .btn-danger { background: var(--danger); }
      .btn-danger:hover { background: #c0392b; }
      .btn-ghost { background: transparent; border: var(--border); color: var(--text); }
      .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

      .card { background: var(--bg-card); border: 2px solid #3E434D; border-radius: var(--radius); }
      .card:hover { border-color: var(--accent); }

      .badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font: 700 11px 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; }
      .badge-orange { border: 1px solid var(--accent); color: var(--accent); }
      .badge-success { background: var(--success); color: #fff; }
      .badge-danger  { background: var(--danger); color: #fff; }
      .badge-warning { background: var(--warning); color: #000; }
      .badge-muted   { background: #444; color: var(--muted); }

      .hazard { background: var(--hazard); height: 4px; }

      .page { min-height: 100vh; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

      input[type="text"], input[type="email"], input[type="password"], input[type="number"], textarea, select {
        background: var(--bg-input); border: var(--border); color: var(--text);
        padding: 9px 12px; border-radius: var(--radius); font: 400 14px 'Inter', sans-serif;
        width: 100%;
      }
      input:focus, textarea:focus, select:focus { border-color: var(--accent); }

      .form-group { display: flex; flex-direction: column; gap: 6px; }
      .form-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; }

      .spinner {
        width: 20px; height: 20px; border: 2px solid #444; border-top-color: var(--accent);
        border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
      .toast { background: var(--bg-card); border: var(--border); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: var(--radius); font-size: 14px; min-width: 240px; }
      .toast.error { border-left-color: var(--danger); }
      .toast.success { border-left-color: var(--success); }
    </style>
    <script type="module" crossorigin src="/demos/orschell-excavating-e-commerce-full/assets/index-C16ANldO.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
